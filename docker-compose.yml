# =============================================================================
# AI Personal Teacher System — Docker Compose (Development)
# Single command: docker compose up
# Access everything via http://localhost
# =============================================================================

services:
  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: leen-nginx
    ports:
      - "8081:80"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - leen-network
    restart: unless-stopped

  # ---- Frontend (React + Vite) ----
  web:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/web.Dockerfile
      target: development
    container_name: leen-web
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8081/api/v1
    depends_on:
      - api
    networks:
      - leen-network

  # ---- Backend (FastAPI) ----
  api:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/api.Dockerfile
      target: development
    container_name: leen-api
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.example
    environment:
      - DATABASE_URL=postgresql://leen:leen_dev_password@postgres:5432/leen_ai
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leen-network

  # ---- Celery Worker ----
  worker:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/api.Dockerfile
      target: development
    container_name: leen-worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.example
    environment:
      - DATABASE_URL=postgresql://leen:leen_dev_password@postgres:5432/leen_ai
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leen-network

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: leen-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: leen_ai
      POSTGRES_USER: leen
      POSTGRES_PASSWORD: leen_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leen -d leen_ai"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - leen-network

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: leen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - leen-network

networks:
  leen-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
